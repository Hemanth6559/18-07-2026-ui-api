name: Database Tests

on:
  push:
  pull_request:

jobs:
  database-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: tripstack
          MYSQL_ROOT_PASSWORD: ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: tripstack
      DB_USER: root
      DB_PASSWORD: ci-password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Run Database Tests
        working-directory: Api-maven
        run: mvn -Dtest=DatabaseConnectionTest test