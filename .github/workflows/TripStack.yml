name: TripStack CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  database-test:
    name: Database Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: tripstack
          MYSQL_ROOT_PASSWORD: ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: tripstack
      DB_USER: root
      DB_PASSWORD: ci-password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Run Database Tests
        working-directory: Api-maven
        run: mvn -Dtest=DatabaseConnectionTest test

  playwright-test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: ui-playwright
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ui-playwright
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        working-directory: ui-playwright
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ui-playwright/playwright-report/
          retention-days: 30
          